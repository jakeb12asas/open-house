<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nepal Landmark Quiz - Leaderboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* Leaderboard specific styles */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    text-align: center;
}

th {
    font-size: 1.2em;
}

tr:nth-child(1) td { background: gold; color: #000; border-radius: 5px; }
tr:nth-child(2) td { background: silver; color: #000; border-radius: 5px; }
tr:nth-child(3) td { background: #cd7f32; color: #000; border-radius: 5px; } /* bronze */
</style>
</head>
<body>

<div class="container">

    <h1>🇳🇵 Nepal Landmark Quiz</h1>
    <p>Leaderboard</p>

    <table id="leaderboardTable">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Score</th>
                <th>Difficulty</th>
            </tr>
        </thead>
        <tbody>
            <!-- Scores populated by JS -->
        </tbody>
    </table>

    <br>
    <button onclick="clearLeaderboard()">Clear Leaderboard</button>
    <br><br>
    <a href="../home.html">Back to Main Menu</a>

</div>

<script src="js/leaderboard.js"></script>

</body>
</html>
